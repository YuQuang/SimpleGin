name: Documentation Request
description: Suggest improvements or additions to the documentation
title: "📖[Doc] Title"
labels: ["documentation"]
body:
- type: textarea
  attributes:
    label: 文檔描述(必填)
    description: 描述需要改進或添加的文檔部分
    render: markdown
  validations:
    required: true
- type: textarea
  attributes:
    label: 其他補充
    description: |
      任何連結、截圖或影片等補充訊息，都可以寫在這裡。
      提示：可以點擊此區域以突出顯示，然後拖入圖片或相關文件。
  validations:
    required: false