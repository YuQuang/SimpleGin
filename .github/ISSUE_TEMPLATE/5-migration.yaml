name: Database Migration Request
description: Request for changes to the database schema, such as adding or modifying tables and columns.
title: "📋[Migration] Title"
labels: ["migration"]
body:
- type: textarea
  attributes:
    label: 更動到的部分(必填)
    description: 表欄位、名稱、類型...等等
    render: markdown
  validations:
    required: true
- type: textarea
  attributes:
    label: 預期回滾的方式(必填)
    description: 稍微描述即可，例如：刪除某個欄位、改回原本的名稱...等等
    render: markdown
  validations:
    required: true
- type: textarea
  attributes:
    label: 其他補充
    description: |
      任何連結、截圖或影片等補充訊息，都可以寫在這裡。
      提示：可以點擊此區域以突出顯示，然後拖入圖片或相關文件。
  validations:
    required: false