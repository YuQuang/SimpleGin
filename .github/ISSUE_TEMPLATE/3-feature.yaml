name: Feature Request
description: Suggest a new feature for the project
title: "⭐️[Feature] Title"
labels: ["feature"]
body:
- type: textarea
  attributes:
    label: 新功能描述(必填)
    description: 描述使用情境，越詳細越好
    render: markdown
  validations:
    required: true
- type: textarea
  attributes:
    label: 預期行為(必填)
    description: 描述預期結果，給定輸入會得到甚麼樣的結果
    render: markdown
  validations:
    required: true
- type: textarea
  attributes:
    label: 其他補充
    description: |
      任何連結、截圖或影片等補充訊息，都可以寫在這裡。
      提示：可以點擊此區域以突出顯示，然後拖入圖片或相關文件。
  validations:
    required: false